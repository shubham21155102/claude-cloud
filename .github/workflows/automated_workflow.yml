
name: Universal Question Bank Generator

on:
  # Runs every 15 minutes
  schedule:
    - cron: '*/15 * * * *'

  # Allows manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      # Question Type Category - Major category of questions
      category:
        description: 'Question Category (DSA, Frontend, Backend, DevOps, System Design, Behavioral, Database, Mobile, etc.)'
        required: true
        type: choice
        options:
          - 'random'
          - 'dsa'
          - 'frontend'
          - 'backend'
          - 'devops'
          - 'system-design'
          - 'behavioral'
          - 'database'
          - 'mobile'
          - 'cloud'
          - 'security'
          - 'testing'
          - 'ai-ml'
        default: 'random'

      # Specific Topic (optional, overrides category)
      topic:
        description: 'Specific Topic (optional - e.g., React, PostgreSQL, AWS, Docker, Kubernetes, Microservices, etc.)'
        required: false
        type: string

      count:
        description: 'Number of questions to generate'
        required: true
        type: number
        default: 50

      difficulty:
        description: 'Difficulty distribution'
        required: true
        type: choice
        options:
          - mixed
          - easy
          - medium
          - hard
        default: 'mixed'

      # Output Format Selection
      output_format:
        description: 'Output format (single format only)'
        required: true
        type: choice
        options:
          - 'all'      # Generate all three formats
          - 'json'     # Standard JSON
          - 'hjson'    # Human-readable JSON
          - 'yaml'     # YAML format
        default: 'all'

      show_logs:
        description: 'Show Claude Code logs'
        required: false
        type: boolean
        default: true

env:
  # Repository Configuration
  DEFAULT_ORG: "MAS-Mr-Mentor"
  DEFAULT_REPO: "mr-mentor-backend"

  # Question Categories Configuration
  DEFAULT_CATEGORY: "random"
  DEFAULT_COUNT: 50
  DEFAULT_DIFFICULTY: "mixed"
  DEFAULT_OUTPUT_FORMAT: "all"

jobs:
  # Job 1: Determine the question category and topic
  determine-category:
    runs-on: ubuntu-latest
    outputs:
      selected_category: ${{ steps.category_selector.outputs.category }}
      selected_topic: ${{ steps.topic_resolver.outputs.topic }}
      output_formats: ${{ steps.format_resolver.outputs.formats }}
    steps:
      - name: Determine Category and Topic
        id: category_selector
        env:
          INPUT_CATEGORY: ${{ inputs.category }}
          INPUT_TOPIC: ${{ inputs.topic }}
        run: |
          # Get current day of year (1-366) for deterministic randomness
          DAY_OF_YEAR=$(date +%j | sed 's/^0*//')

          # Define all categories array
          CATEGORIES=("dsa" "frontend" "backend" "devops" "system-design" "behavioral" "database" "mobile" "cloud" "security" "testing" "ai-ml")
          NUM_CATEGORIES=${#CATEGORIES[@]}

          # Select category (random or user-specified)
          if [ "$INPUT_CATEGORY" = "random" ] || [ -z "$INPUT_CATEGORY" ]; then
            # Use day of year to pseudo-randomly select a category
            INDEX=$(( ($DAY_OF_YEAR * 7) % $NUM_CATEGORIES ))
            SELECTED_CATEGORY="${CATEGORIES[$INDEX]}"
          else
            SELECTED_CATEGORY="$INPUT_CATEGORY"
          fi

          echo "Selected Category: $SELECTED_CATEGORY"
          echo "category=$SELECTED_CATEGORY" >> $GITHUB_OUTPUT

      - name: Resolve Specific Topic
        id: topic_resolver
        env:
          CATEGORY: ${{ steps.category_selector.outputs.category }}
          INPUT_TOPIC: ${{ inputs.topic }}
        run: |
          # If user provided a specific topic, use it; otherwise use category
          if [ -n "$INPUT_TOPIC" ]; then
            FINAL_TOPIC="$INPUT_TOPIC"
          else
            FINAL_TOPIC="$CATEGORY"
          fi

          echo "Final Topic: $FINAL_TOPIC"
          echo "topic=$FINAL_TOPIC" >> $GITHUB_OUTPUT

      - name: Resolve Output Formats
        id: format_resolver
        env:
          OUTPUT_FORMAT: ${{ inputs.output_format }}
        run: |
          case "$OUTPUT_FORMAT" in
            "all")
              FORMATS='["json", "hjson", "yaml"]'
              ;;
            "json")
              FORMATS='["json"]'
              ;;
            "hjson")
              FORMATS='["hjson"]'
              ;;
            "yaml")
              FORMATS='["yaml"]'
              ;;
            *)
              FORMATS='["json"]'
              ;;
          esac

          echo "Output Formats: $FORMATS"
          echo "formats=$FORMATS" >> $GITHUB_OUTPUT

  generate-questions:
    runs-on: ubuntu-latest
    needs: determine-category

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install
          npm install -g @anthropic-ai/claude-code
          npm link

      # Step 1: Planning Agent - Creates comprehensive plan for the selected category/topic
      - name: Planner Agent - Create Comprehensive Plan
        id: planner_agent
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          CATEGORY: ${{ needs.determine-category.outputs.selected_category }}
          TOPIC: ${{ needs.determine-category.outputs.selected_topic }}
          QUESTION_COUNT: ${{ inputs.count || env.DEFAULT_COUNT }}
          DIFFICULTY: ${{ inputs.difficulty || env.DEFAULT_DIFFICULTY }}
          OUTPUT_FORMATS: ${{ needs.determine-category.outputs.output_formats }}
        run: |
          echo "🧠 Planning content for category: $CATEGORY, topic: $TOPIC..."

          PLANNER_PROMPT="You are a Technical Interview Expert and Curriculum Designer with deep knowledge across all domains of software engineering and job interviews.

          Create a comprehensive plan to generate $QUESTION_COUNT industry-standard interview questions.

          **Parameters:**
          - Category: $CATEGORY
          - Specific Topic: $TOPIC
          - Difficulty Preference: $DIFFICULTY
          - Output Formats: $OUTPUT_FORMATS

          **Requirements:**
          1. Identify ALL relevant sub-topics for this category/topic
          2. Include a mix of question types:
             - Multiple-choice questions (MCQ) for conceptual knowledge
             - Coding questions for practical implementation
             - System design questions for architectural thinking
             - Behavioral questions for soft skills (if relevant)
          3. Suggest a balanced distribution across difficulty levels: $DIFFICULTY
          4. Ensure questions are FAANG/MAANG level quality
          5. DO NOT replace existing files - create new timestamped files

          **Question Categories Coverage:**
          - DSA: Data Structures, Algorithms, Complexity Analysis
          - Frontend: HTML, CSS, JavaScript, TypeScript, Frameworks (React, Vue, Angular), State Management, Performance, Accessibility
          - Backend: Node.js, Python, Java, REST APIs, GraphQL, Authentication, Microservices, Databases, Caching
          - DevOps: Docker, Kubernetes, CI/CD, Git, Linux, Monitoring, Logging
          - System Design: Scalability, HLD, LLD, CAP Theorem, Distributed Systems
          - Database: SQL, NoSQL, Indexing, Transactions, ACID, Design
          - Cloud: AWS, Azure, GCP, Serverless, Architecture
          - Security: OWASP, Authentication, Authorization, Encryption
          - Testing: Unit, Integration, E2E, TDD, BDD
          - Mobile: React Native, Flutter, iOS, Android
          - AI/ML: ML Algorithms, Deep Learning, NLP, Computer Vision, MLOps

          Output a structured plan with sub-topics and question counts per sub-topic.
          "

          # Call the Z.AI API
          RESPONSE=$(curl -s -X POST https://api.z.ai/api/anthropic/v1/messages \
            -H "Content-Type: application/json" \
            -H "x-api-key: $ZAI_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -d "{
              \"model\": \"claude-opus-4-5-20251101\",
              \"max_tokens\": 4096,
              \"messages\": [{ \"role\": \"user\", \"content\": \"$PLANNER_PROMPT\" }]
            }" \
            --max-time 3000)

          PLAN_CONTENT=$(echo "$RESPONSE" | jq -r '.content[0].text')

          echo "📋 Generated Plan:"
          echo "$PLAN_CONTENT"

          # Save plan to environment file for the next step
          {
            echo "GENERATED_PLAN<<EOF"
            echo "$PLAN_CONTENT"
            echo "EOF"
          } >> $GITHUB_ENV

      # Step 2: Configure Claude Cloud CLI
      - name: Configure Claude Cloud
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_EMAIL: ${{ secrets.GH_EMAIL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        run: |
          cat <<EOF > $HOME/.claude-cloud-config.json
          {
            "githubUsername": "$GH_USERNAME",
            "githubEmail": "$GH_EMAIL",
            "githubToken": "$GH_TOKEN",
            "zaiApiKey": "$ZAI_API_KEY",
            "workDir": "$GITHUB_WORKSPACE/temp_repos"
          }
          EOF

      # Step 3: Execute Generation - Creates questions in multiple formats
      - name: Run Universal Question Generation
        env:
          ANTHROPIC_DEFAULT_OPUS_MODEL: GLM-4.7
          ORG_NAME: ${{ env.DEFAULT_ORG }}
          REPO_NAME: ${{ env.DEFAULT_REPO }}

          # Dynamic parameters
          TARGET_CATEGORY: ${{ needs.determine-category.outputs.selected_category }}
          TARGET_TOPIC: ${{ needs.determine-category.outputs.selected_topic }}
          OUTPUT_FORMATS: ${{ needs.determine-category.outputs.output_formats }}

          CLAUDE_CLOUD_ISSUE: |
            # Universal Interview Question Generator

            **Task:** Generate a comprehensive question bank for the following parameters:

            - **Category:** ${{ needs.determine-category.outputs.selected_category }}
            - **Topic:** ${{ needs.determine-category.outputs.selected_topic }}
            - **Question Count:** ${{ inputs.count || 50 }}
            - **Difficulty:** ${{ inputs.difficulty || 'mixed' }}
            - **Output Formats:** ${{ needs.determine-category.outputs.output_formats }}

            ## Directory Structure
            Create the following directory structure (if not exists):
            ```
            src/data/questionBanks/
            ├── ${{ needs.determine-category.outputs.selected_category }}/
            │   ├── questions.json
            │   ├── questions.hjson
            │   └── questions.yaml
            ```

            ## Question Types to Generate
            Generate a mix of the following question types based on the category:

            1. **Multiple Choice Questions (MCQ)** - For conceptual knowledge
            2. **Coding Questions** - For practical implementation
            3. **System Design Questions** - For architectural thinking
            4. **Short Answer Questions** - For quick assessments
            5. **Essay/Discussion Questions** - For in-depth understanding
            6. **Behavioral Questions** - For soft skills (if applicable)

            ## JSON Format Schema
            For `questions.json` file:
            ```json
            {
              "metadata": {
                "category": "${{ needs.determine-category.outputs.selected_category }}",
                "topic": "${{ needs.determine-category.outputs.selected_topic }}",
                "generatedAt": "ISO-8601-TIMESTAMP",
                "difficulty": "${{ inputs.difficulty || 'mixed' }}",
                "totalQuestions": <count>
              },
              "questions": [
                {
                  "id": "unique-id",
                  "type": "multiple-choice|coding|system-design|short-answer|essay|behavioral",
                  "difficulty": "easy|medium|hard",
                  "question": "Question text here",
                  "points": <number>,
                  "timeLimit": <seconds>,
                  "options": ["A", "B", "C", "D"], // for MCQ
                  "correctAnswer": "A", // for MCQ
                  "codeTemplate": "function solution() {}", // for coding
                  "language": "javascript|python|java|etc", // for coding
                  "tags": ["tag1", "tag2"],
                  "explanation": "Detailed explanation"
                }
              ]
            }
            ```

            ## HJSON Format Schema
            For `questions.hjson` file (human-readable JSON):
            ```hjson
            {
              metadata: {
                category: '${{ needs.determine-category.outputs.selected_category }}'
                topic: '${{ needs.determine-category.outputs.selected_topic }}'
                generatedAt: 'ISO-8601-TIMESTAMP'
                difficulty: '${{ inputs.difficulty || 'mixed' }}'
                totalQuestions: <count>
              }
              questions: [
                {
                  id: 'unique-id'
                  type: 'multiple-choice'
                  difficulty: 'easy'
                  question: 'Question text here'
                  points: 2
                  timeLimit: 30
                  options: [
                    'Option A'
                    'Option B'
                    'Option C'
                    'Option D'
                  ]
                  correctAnswer: 'Option A'
                  tags: [
                    'tag1'
                    'tag2'
                  ]
                  explanation: 'Detailed explanation'
                }
              ]
            }
            ```

            ## YAML Format Schema
            For `questions.yaml` file:
            ```yaml
            metadata:
              category: ${{ needs.determine-category.outputs.selected_category }}
              topic: ${{ needs.determine-category.outputs.selected_topic }}
              generatedAt: ISO-8601-TIMESTAMP
              difficulty: ${{ inputs.difficulty || 'mixed' }}
              totalQuestions: <count>
            questions:
              - id: unique-id
                type: multiple-choice
                difficulty: easy
                question: Question text here
                points: 2
                timeLimit: 30
                options:
                  - Option A
                  - Option B
                  - Option C
                  - Option D
                correctAnswer: Option A
                tags:
                  - tag1
                  - tag2
                explanation: Detailed explanation
            ```

            ## Comprehensive Category Coverage

            Generate questions covering these aspects based on the category:

            ### DSA Category
            - Arrays, Strings, Linked Lists, Trees, Graphs, Hashing, DP, Greedy, Sorting, Searching
            - Time & Space Complexity analysis
            - Algorithm design patterns

            ### Frontend Category
            - HTML5, CSS3, JavaScript (ES6+), TypeScript
            - Frameworks: React, Vue, Angular, Next.js, Nuxt.js
            - State Management: Redux, Pinia, Vuex, Zustand
            - Styling: Tailwind, Styled Components, SCSS
            - Performance, Accessibility, SEO, Browser APIs

            ### Backend Category
            - Node.js, Express, Python (Django, Flask, FastAPI), Java (Spring)
            - REST APIs, GraphQL, gRPC
            - Authentication: JWT, OAuth, Sessions
            - Databases: SQL (PostgreSQL, MySQL) and NoSQL (MongoDB, Redis)
            - Microservices, Message Queues (Kafka, RabbitMQ)

            ### DevOps Category
            - Docker, Kubernetes, Helm
            - CI/CD: GitHub Actions, GitLab CI, Jenkins
            - Git, GitHub, GitLab, GitOps
            - Linux, Shell Scripting, Bash
            - Monitoring: Prometheus, Grafana, ELK Stack
            - IaC: Terraform, CloudFormation, Ansible

            ### System Design Category
            - HLD (High-Level Design), LLD (Low-Level Design)
            - Scalability, Load Balancing, Caching
            - CAP Theorem, ACID Properties
            - Distributed Systems, Consensus Algorithms
            - API Design, Microservices Architecture

            ### Database Category
            - SQL: Joins, Indexing, Query Optimization, Normalization
            - NoSQL: Document, Key-Value, Column, Graph databases
            - Transactions, Concurrency, ACID, BASE
            - Replication, Sharding, Partitioning
            - ElasticSearch, Data Modeling

            ### Cloud Category
            - AWS: EC2, S3, Lambda, RDS, DynamoDB, VPC, IAM
            - Azure: App Service, Functions, Cosmos DB
            - GCP: Compute Engine, Cloud Functions, BigQuery
            - Serverless, Cloud Architecture Patterns
            - Cost Optimization, Security

            ### Security Category
            - OWASP Top 10, XSS, CSRF, SQL Injection
            - Authentication, Authorization, Encryption
            - HTTPS, SSL/TLS, Certificate Management
            - Security Headers, CORS, CSP
            - Penetration Testing, Security Audits

            ### Testing Category
            - Unit Testing (Jest, Mocha, JUnit, PyTest)
            - Integration Testing, E2E Testing (Cypress, Playwright)
            - TDD, BDD, Testing Pyramids
            - Mocking, Stubbing, Test Doubles
            - API Testing, Performance Testing

            ### Mobile Category
            - React Native, Flutter
            - iOS (Swift, SwiftUI), Android (Kotlin, Jetpack Compose)
            - Mobile Architecture Patterns (MVVM, Clean Architecture)
            - State Management, Navigation
            - Performance Optimization, Offline Support

            ### AI/ML Category
            - ML Algorithms: Regression, Classification, Clustering
            - Deep Learning: Neural Networks, CNNs, RNNs, Transformers
            - NLP: Tokenization, Embeddings, LLMs
            - MLOps: Model Deployment, Monitoring, Versioning
            - Frameworks: TensorFlow, PyTorch, Scikit-learn

            ### Behavioral Category
            - Leadership, Teamwork, Conflict Resolution
            - Problem-Solving, Adaptability
            - Communication, Time Management
            - STAR Method Questions
            - Cultural Fit Questions

            ## Instructions

            1. **DO NOT** replace existing files - create new files with timestamp suffixes if needed
            2. Generate exactly ${{ inputs.count || 50 }} questions distributed evenly across relevant sub-topics
            3. Ensure all questions are industry-standard and interview-ready
            4. Use the generated plan below for guidance:

            --- PLAN START ---
            ${{ env.GENERATED_PLAN }}
            --- PLAN END ---

            5. Create ALL requested output formats: ${{ needs.determine-category.outputs.output_formats }}
            6. Ensure each format is valid and can be parsed correctly
            7. Add unique IDs to each question for tracking

          CLAUDE_CLOUD_SHOW_LOGS: ${{ github.event.client_payload.show_logs == true || inputs.show_logs == true && 'true' || 'false' }}
        run: |
          echo "🚀 Generating questions for category: $TARGET_CATEGORY, topic: $TARGET_TOPIC"
          echo "📁 Output formats: $OUTPUT_FORMATS"
          claude-cloud contribute --org "$ORG_NAME" --repo "$REPO_NAME"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-logs-${{ github.run_id }}
          path: ${{ github.workspace }}/temp_repos/*/.claude-logs.txt
          if-no-files-found: ignore
